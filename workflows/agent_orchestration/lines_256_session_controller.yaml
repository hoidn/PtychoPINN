version: "2.7"

steps:
  - name: ValidateControllerInputs
    type: command
    command:
      - python
      - -c
      - |
        from pathlib import Path

        required = [
            Path("docs/studies/lines_256_dataset.md"),
            Path("docs/studies/lines_256_controller_loop.md"),
            Path("scripts/studies/lines_256_session_controller.py"),
            Path("scripts/studies/run_lines_256_arch_experiment.py"),
        ]
        missing = [str(path) for path in required if not path.exists()]
        if missing:
            raise SystemExit("Missing required controller inputs: " + ", ".join(missing))

  - name: RunController
    type: command
    command:
      - python
      - scripts/studies/lines_256_session_controller.py
      - start
      - --repo-root
      - .
