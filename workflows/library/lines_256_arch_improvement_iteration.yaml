                "timed_out": False,
            }
            log_path.write_text(
                proc.stdout + ("\n" if proc.stdout and not proc.stdout.endswith("\n") else "")
                + proc.stderr,
                encoding="utf-8",
            )
        except subprocess.TimeoutExpired as exc:
            payload = {
                "launcher_status": "timeout",
                "exit_code": 124,
                "timed_out": True,
            }
            stdout = exc.stdout or ""
            stderr = exc.stderr or ""
            log_path.write_text(
                stdout + ("\n" if stdout and not stdout.endswith("\n") else "") + stderr,
                encoding="utf-8",
            )

        Path(context["debug_candidate_run_result_path"]).write_text(
            json.dumps(payload, indent=2) + "\n",
            encoding="utf-8",
        )
        PY
    timeout_sec: 1860
    output_bundle:
      path: ${inputs.write_root}/debug_candidate_run_result.json
      fields:
        - name: launcher_status
          json_pointer: /launcher_status
          type: enum
          allowed: ["completed", "timeout"]
        - name: exit_code
          json_pointer: /exit_code
          type: integer
        - name: timed_out
          json_pointer: /timed_out
          type: bool

  - name: HarvestDebuggedCandidateOutputs
    id: harvest_debugged_candidate_outputs
    when:
      compare:
        left:
          ref: root.steps.AssessCrashDebugReadiness.artifacts.debug_status
        op: eq
        right: READY
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import json
        import shutil
        from pathlib import Path

        context = json.loads(
            Path("${inputs.write_root}/candidate_context.json").read_text(encoding="utf-8")
        )
        metadata = json.loads(
            Path("${inputs.write_root}/debug_candidate_metadata.json").read_text(encoding="utf-8")
        )
        accepted = json.loads(
            Path("state/lines_256_arch_improvement/accepted_state.json").read_text(encoding="utf-8")
        )
        run_result = json.loads(
            Path(context["debug_candidate_run_result_path"]).read_text(encoding="utf-8")
        )

        output_root = Path(metadata["output_root"])
        compare_png = None
        amp_ssim = None
        decision = "CRASH"
        delta = None
        accepted_randomness = accepted.get("accepted_randomness_contract")

        if run_result["launcher_status"] == "timeout":
            decision = "TIMEOUT"
        elif run_result["launcher_status"] == "completed" and run_result["exit_code"] == 0:
            randomness_path = output_root / "runs" / "pinn_hybrid_resnet" / "randomness_contract.json"
            if not randomness_path.exists():
                randomness_candidates = sorted(output_root.rglob("randomness_contract.json"))
                if randomness_candidates:
                    randomness_path = randomness_candidates[0]
            candidate_randomness = None
            if randomness_path.exists():
                candidate_randomness = json.loads(randomness_path.read_text(encoding="utf-8"))

            if accepted_randomness is None or candidate_randomness is None:
                decision = "BLOCKED"
            elif candidate_randomness != accepted_randomness:
                decision = "BLOCKED"
            else:
                metrics_path = output_root / "runs" / "pinn_hybrid_resnet" / "metrics.json"
                if not metrics_path.exists():
                    candidates = sorted(output_root.rglob("metrics.json"))
                    if candidates:
                        metrics_path = candidates[0]
                if metrics_path.exists():
                    metrics = json.loads(metrics_path.read_text(encoding="utf-8"))
                    amp_ssim = metrics.get("amp_ssim")
                    if amp_ssim is None:
                        ssim = metrics.get("ssim")
                        if isinstance(ssim, list) and len(ssim) >= 1:
                            amp_ssim = ssim[0]

                compare_source = output_root / "visuals" / "compare_amp_phase.png"
                if not compare_source.exists():
                    compare_candidates = sorted(output_root.rglob("compare_amp_phase.png"))
                    if compare_candidates:
                        compare_source = compare_candidates[0]
                if compare_source.exists():
                    target = Path(metadata["comparison_png_path"])
                    target.parent.mkdir(parents=True, exist_ok=True)
                    shutil.copy2(compare_source, target)
                    compare_png = metadata["comparison_png_path"]

                if amp_ssim is not None and compare_png is not None:
                    delta = float(amp_ssim) - float(accepted["accepted_amp_ssim"])
                    decision = "KEEP" if float(amp_ssim) > float(accepted["accepted_amp_ssim"]) else "DISCARD"

        payload = {
            "decision": decision,
            "compared_to_ref": accepted["accepted_ref"],
            "compared_to_amp_ssim": accepted["accepted_amp_ssim"],
        }
        if amp_ssim is not None:
            payload["candidate_amp_ssim"] = amp_ssim
        if delta is not None:
            payload["delta_amp_ssim"] = delta
        if compare_png is not None:
            payload["comparison_png_path"] = compare_png
        Path(context["debug_candidate_assessment_path"]).write_text(
            json.dumps(payload, indent=2) + "\n",
            encoding="utf-8",
        )
        PY
    output_bundle:
      path: ${inputs.write_root}/debug_candidate_assessment.json
      fields:
        - name: decision
          json_pointer: /decision
          type: enum
          allowed: ["KEEP", "DISCARD", "TIMEOUT", "CRASH", "BLOCKED"]
        - name: candidate_amp_ssim
          json_pointer: /candidate_amp_ssim
          type: float
          required: false
        - name: compared_to_amp_ssim
          json_pointer: /compared_to_amp_ssim
          type: float
        - name: delta_amp_ssim
          json_pointer: /delta_amp_ssim
          type: float
          required: false
        - name: comparison_png_path
          json_pointer: /comparison_png_path
          type: relpath
          under: outputs/lines_256_arch_improvement
          required: false

  - name: AppendDebuggedCandidateLedgerRow
    id: append_debugged_candidate_ledger_row
    when:
      compare:
        left:
          ref: root.steps.AssessCrashDebugReadiness.artifacts.debug_status
        op: eq
        right: READY
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import csv
        import json
        from datetime import datetime, timezone
        from pathlib import Path

        session = json.loads(
            Path("state/lines_256_arch_improvement/session_context.json").read_text(encoding="utf-8")
        )
        metadata = json.loads(
            Path("${inputs.write_root}/debug_candidate_metadata.json").read_text(encoding="utf-8")
        )
        assessment = json.loads(
            Path("${inputs.write_root}/debug_candidate_assessment.json").read_text(encoding="utf-8")
        )

        ledger = Path(session["results_tsv_path"])
        with ledger.open("a", encoding="utf-8", newline="") as fh:
            writer = csv.writer(fh, delimiter="\t")
            writer.writerow(
                [
                    session["session_id"],
                    datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
                    metadata.get("candidate_commit") or metadata.get("base_ref", "na"),
                    assessment["decision"].lower(),
                    assessment["candidate_amp_ssim"] if assessment.get("candidate_amp_ssim") is not None else "na",
                    assessment["compared_to_ref"],
                    assessment["compared_to_amp_ssim"],
                    assessment["delta_amp_ssim"] if assessment.get("delta_amp_ssim") is not None else "na",
                    metadata.get("output_root", "na"),
                    assessment.get("comparison_png_path", "na") or "na",
                    metadata.get("run_command", "na"),
                    metadata.get("note", ""),
                ]
            )
        PY

  - name: AssessDebuggedCandidateOutcome
    id: assess_debugged_candidate_outcome
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import json
        from pathlib import Path

        state_dir = Path("${inputs.write_root}")
        debug_status = json.loads(
            (state_dir / "crash_debug_status.json").read_text(encoding="utf-8")
        )["debug_status"]
        assessment_path = state_dir / "debug_candidate_assessment.json"

        if debug_status != "READY":
            payload = {"debugged_outcome": "NONE"}
        elif not assessment_path.exists():
            payload = {"debugged_outcome": "CRASH"}
        else:
            assessment = json.loads(assessment_path.read_text(encoding="utf-8"))
            payload = {"debugged_outcome": assessment.get("decision", "CRASH")}

        (state_dir / "debugged_candidate_outcome.json").write_text(
            json.dumps(payload, indent=2) + "\n",
            encoding="utf-8",
        )
        PY
    output_bundle:
      path: ${inputs.write_root}/debugged_candidate_outcome.json
      fields:
        - name: debugged_outcome
          json_pointer: /debugged_outcome
          type: enum
          allowed: ["NONE", "KEEP", "DISCARD", "TIMEOUT", "CRASH", "BLOCKED"]

  - name: HandleDebuggedCandidateOutcome
    id: handle_debugged_candidate_outcome
    command:
      - python
      - scripts/studies/lines_256_handle_candidate_outcome.py
      - --mode
      - debugged
      - --session-state-dir
      - state/lines_256_arch_improvement
      - --state-dir
      - ${inputs.write_root}

  - name: FinalizeIterationDecision
    id: finalize_iteration_decision
    command:
      - bash
      - -lc
      - |
        python - <<'PY'
        import json
        from pathlib import Path

        state_dir = Path("${inputs.write_root}")
        metadata_path = state_dir / "candidate_metadata.json"
        assessment_path = state_dir / "candidate_assessment.json"
        initial_outcome_path = state_dir / "initial_candidate_outcome.json"
        debug_status_path = state_dir / "crash_debug_status.json"
        debugged_outcome_path = state_dir / "debugged_candidate_outcome.json"
        decision_path = state_dir / "iteration_decision.json"

        if (
            not metadata_path.exists()
            or not initial_outcome_path.exists()
            or not debug_status_path.exists()
            or not debugged_outcome_path.exists()
        ):
            payload = {"loop_decision": "STOP"}
        else:
            metadata = json.loads(metadata_path.read_text(encoding="utf-8"))
            status = metadata.get("status")
            initial_outcome = json.loads(initial_outcome_path.read_text(encoding="utf-8"))["initial_outcome"]
            debug_status = json.loads(debug_status_path.read_text(encoding="utf-8"))["debug_status"]
            debugged_outcome = json.loads(debugged_outcome_path.read_text(encoding="utf-8"))["debugged_outcome"]

            if status == "BLOCKED" or initial_outcome == "BLOCKED":
                payload = {"loop_decision": "STOP"}
            elif debug_status == "BLOCKED":
                payload = {"loop_decision": "STOP"}
            elif debug_status == "READY":
                payload = {
                    "loop_decision": "CONTINUE" if debugged_outcome in {"KEEP", "DISCARD", "TIMEOUT"} else "STOP"
                }
            elif debug_status == "NONE":
                payload = {
                    "loop_decision": "CONTINUE" if initial_outcome in {"KEEP", "DISCARD", "TIMEOUT"} else "STOP"
                }
            elif assessment_path.exists():
                assessment = json.loads(assessment_path.read_text(encoding="utf-8"))
                payload = {
                    "loop_decision": "CONTINUE" if assessment.get("decision") in {"KEEP", "DISCARD", "TIMEOUT"} else "STOP"
                }
            else:
                payload = {"loop_decision": "STOP"}

        decision_path.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
        PY
    output_bundle:
      path: ${inputs.write_root}/iteration_decision.json
      fields:
        - name: loop_decision
          json_pointer: /loop_decision
          type: enum
          allowed: ["CONTINUE", "STOP"]
