version: "2.7"
name: "revision-study-design-plan-impl-monolith"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
    default: state/revision-study
  revision_design_path:
    type: relpath
    must_exist_target: true
    description: Human-authored revision study design seed. Treated as read-only.
  revision_context_path:
    type: relpath
    default: reviewer_revision_checklist.md
    description: Optional reviewer checklist or revision context file. If missing, the workflow generates a minimal context note.
  approved_design_target_path:
    type: relpath
    under: artifacts/revision_studies
    default: artifacts/revision_studies/current/approved_design.md
  design_review_report_target_path:
    type: relpath
    under: artifacts/revision_studies
    default: artifacts/revision_studies/current/design_review.json
  plan_target_path:
    type: relpath
    under: artifacts/revision_studies
    default: artifacts/revision_studies/current/implementation_plan.md
  plan_review_report_target_path:
    type: relpath
    under: artifacts/revision_studies
    default: artifacts/revision_studies/current/plan_review.json
  execution_report_target_path:
    type: relpath
    under: artifacts/revision_studies
    default: artifacts/revision_studies/current/execution_report.md
  implementation_review_report_target_path:
    type: relpath
    under: artifacts/revision_studies
    default: artifacts/revision_studies/current/implementation_review.md

outputs:
  approved_design_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.approved_design_path
  revision_context_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.revision_context_path
  design_review_report_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.design_review_report_path
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.design_review_decision
  plan_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.plan_path
  plan_review_report_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.plan_review_report_path
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.plan_review_decision
  execution_report_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.execution_report_path
  implementation_review_report_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.implementation_review_report_path
  implementation_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
    from:
      ref: root.steps.FinalizeRevisionStudyOutputs.artifacts.implementation_review_decision

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  revision_design_seed:
    pointer: ${inputs.state_root}/revision_design_seed_path.txt
    type: relpath
    must_exist_target: true
  revision_context:
    pointer: ${inputs.state_root}/revision_context_path.txt
    type: relpath
    under: state
    must_exist_target: true
  approved_design:
    pointer: ${inputs.state_root}/approved_design_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  design_review_report:
    pointer: ${inputs.state_root}/design_review_report_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
  design_open_findings:
    pointer: ${inputs.state_root}/design_open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  design_loop_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
  plan:
    pointer: ${inputs.state_root}/plan_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  plan_review_report:
    pointer: ${inputs.state_root}/plan_review_report_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  plan_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  plan_open_findings:
    pointer: ${inputs.state_root}/plan_open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  plan_loop_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  execution_report:
    pointer: ${inputs.state_root}/execution_report_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  implementation_review_report:
    pointer: ${inputs.state_root}/implementation_review_report_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  implementation_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]
  implementation_open_findings:
    pointer: ${inputs.state_root}/implementation_open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  implementation_loop_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE"]

steps:
  - name: InitializeRevisionStudyPaths
    id: initialize_revision_study_paths
    command:
      - bash
      - -lc
      - |
        mkdir -p "${inputs.state_root}"
        mkdir -p "$(dirname "${inputs.approved_design_target_path}")"
        mkdir -p "$(dirname "${inputs.design_review_report_target_path}")"
        mkdir -p "$(dirname "${inputs.plan_target_path}")"
        mkdir -p "$(dirname "${inputs.plan_review_report_target_path}")"
        mkdir -p "$(dirname "${inputs.execution_report_target_path}")"
        mkdir -p "$(dirname "${inputs.implementation_review_report_target_path}")"
        printf '%s\n' "${inputs.approved_design_target_path}" > "${inputs.state_root}/approved_design_path.txt"
        printf '%s\n' "${inputs.design_review_report_target_path}" > "${inputs.state_root}/design_review_report_path.txt"
        printf '%s\n' "${inputs.plan_target_path}" > "${inputs.state_root}/plan_path.txt"
        printf '%s\n' "${inputs.plan_review_report_target_path}" > "${inputs.state_root}/plan_review_report_path.txt"
        printf '%s\n' "${inputs.execution_report_target_path}" > "${inputs.state_root}/execution_report_path.txt"
        printf '%s\n' "${inputs.implementation_review_report_target_path}" > "${inputs.state_root}/implementation_review_report_path.txt"
        printf '%s\n' "${inputs.state_root}/design_open_findings.json" > "${inputs.state_root}/design_open_findings_path.txt"
        printf '%s\n' "${inputs.state_root}/plan_open_findings.json" > "${inputs.state_root}/plan_open_findings_path.txt"
        printf '%s\n' "${inputs.state_root}/implementation_open_findings.json" > "${inputs.state_root}/implementation_open_findings_path.txt"
        printf '%s\n' "${inputs.state_root}/implementation_review_findings.json" > "${inputs.state_root}/implementation_review_findings_path.txt"
        printf '{"findings": []}\n' > "${inputs.state_root}/design_open_findings.json"
        printf '{"findings": []}\n' > "${inputs.state_root}/plan_open_findings.json"
        printf '{"findings": []}\n' > "${inputs.state_root}/implementation_open_findings.json"
    expected_outputs:
      - name: approved_design_path
        path: ${inputs.state_root}/approved_design_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: design_review_report_path
        path: ${inputs.state_root}/design_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: plan_path
        path: ${inputs.state_root}/plan_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: plan_review_report_path
        path: ${inputs.state_root}/plan_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: execution_report_path
        path: ${inputs.state_root}/execution_report_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: implementation_review_report_path
        path: ${inputs.state_root}/implementation_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: design_open_findings_path
        path: ${inputs.state_root}/design_open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: plan_open_findings_path
        path: ${inputs.state_root}/plan_open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: implementation_open_findings_path
        path: ${inputs.state_root}/implementation_open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: design_open_findings
        from: design_open_findings_path
      - artifact: plan_open_findings
        from: plan_open_findings_path
      - artifact: implementation_open_findings
        from: implementation_open_findings_path

  - name: PublishRevisionStudyInputs
    id: publish_revision_study_inputs
    command:
      - bash
      - -lc
      - |
        if [ ! -f "${inputs.revision_design_path}" ]; then
          echo "Missing revision design seed: ${inputs.revision_design_path}" >&2
          exit 1
        fi
        printf '%s\n' "${inputs.revision_design_path}" > "${inputs.state_root}/revision_design_seed_path.txt"

        context_target="${inputs.state_root}/revision_context.md"
        if [ -f "${inputs.revision_context_path}" ]; then
          cp "${inputs.revision_context_path}" "$context_target"
        else
          cat > "$context_target" <<'EOF'
        # Revision Context

        No separate revision context file was found. Use the consumed revision design seed as the primary source of study scope and reviewer-response requirements.
        EOF
        fi
        printf '%s\n' "$context_target" > "${inputs.state_root}/revision_context_path.txt"
    expected_outputs:
      - name: revision_design_seed_path
        path: ${inputs.state_root}/revision_design_seed_path.txt
        type: relpath
        must_exist_target: true
      - name: revision_context_path
        path: ${inputs.state_root}/revision_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: revision_design_seed
        from: revision_design_seed_path
      - artifact: revision_context
        from: revision_context_path

  - name: DraftApprovedRevisionDesign
    id: draft_approved_revision_design
    provider: codex
    asset_file: prompts/revision_study_stack/draft_approved_design.md
    timeout_sec: 3600
    consumes:
      - artifact: revision_design_seed
        policy: latest_successful
        freshness: any
      - artifact: revision_context
        policy: latest_successful
        freshness: any
    prompt_consumes: ["revision_design_seed", "revision_context"]
    expected_outputs:
      - name: approved_design_path
        path: ${inputs.state_root}/approved_design_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
    publishes:
      - artifact: approved_design
        from: approved_design_path

  - name: RevisionDesignReviewLoop
    id: revision_design_review_loop
    repeat_until:
      id: revision_design_review_iteration
      max_iterations: 12
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "BLOCK"]
          from:
            ref: self.steps.RouteRevisionDesignDecision.artifacts.design_loop_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewApprovedRevisionDesign
          id: review_approved_revision_design
          provider: codex
          asset_file: prompts/revision_study_stack/review_design.md
          timeout_sec: 1800
          depends_on:
            optional:
              - docs/index.md
              - docs/findings.md
              - docs/DEVELOPER_GUIDE.md
              - docs/architecture.md
              - specs/data_contracts.md
            inject:
              mode: list
              position: prepend
              instruction: "Repository documentation candidate files resolved from depends_on.optional:"
          consumes:
            - artifact: revision_design_seed
              policy: latest_successful
              freshness: any
            - artifact: revision_context
              policy: latest_successful
              freshness: any
            - artifact: approved_design
              policy: latest_successful
              freshness: any
            - artifact: design_open_findings
              policy: latest_successful
              freshness: any
          prompt_consumes: ["revision_design_seed", "revision_context", "approved_design", "design_open_findings"]
          expected_outputs:
            - name: design_review_report_path
              path: ${inputs.state_root}/design_review_report_path.txt
              type: relpath
              under: artifacts/revision_studies
              must_exist_target: true
            - name: design_review_decision
              path: ${inputs.state_root}/design_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "BLOCK"]
            - name: unresolved_high_count
              path: ${inputs.state_root}/design_unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/design_unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: design_review_report
              from: design_review_report_path
            - artifact: design_review_decision
              from: design_review_decision

        - name: RouteRevisionDesignDecision
          id: route_revision_design_decision
          match:
            ref: self.steps.ReviewApprovedRevisionDesign.artifacts.design_review_decision
            cases:
              APPROVE:
                id: approve_revision_design_path
                outputs:
                  design_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteApprovedRevisionDesignDecision.artifacts.design_loop_decision
                steps:
                  - name: WriteApprovedRevisionDesignDecision
                    id: write_approved_revision_design_decision
                    set_scalar:
                      artifact: design_loop_decision
                      value: APPROVE
              REVISE:
                id: revise_revision_design_path
                outputs:
                  design_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteRevisedRevisionDesignDecision.artifacts.design_loop_decision
                steps:
                  - name: ReviseApprovedRevisionDesign
                    id: revise_approved_revision_design
                    provider: codex
                    asset_file: prompts/revision_study_stack/revise_design.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: revision_design_seed
                        policy: latest_successful
                        freshness: any
                      - artifact: revision_context
                        policy: latest_successful
                        freshness: any
                      - artifact: approved_design
                        policy: latest_successful
                        freshness: any
                      - artifact: design_review_report
                        policy: latest_successful
                        freshness: since_last_consume
                    prompt_consumes: ["revision_design_seed", "revision_context", "approved_design", "design_review_report"]
                    expected_outputs:
                      - name: approved_design_path
                        path: ${inputs.state_root}/approved_design_path.txt
                        type: relpath
                        under: artifacts/revision_studies
                        must_exist_target: true
                    publishes:
                      - artifact: approved_design
                        from: approved_design_path
                  - name: ExtractOpenRevisionDesignFindings
                    id: extract_open_revision_design_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/design_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))
                        carried = [
                            finding
                            for finding in report.get("findings", [])
                            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}
                        ]
                        open_findings_pointer = Path("${inputs.state_root}/design_open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(json.dumps({"findings": carried}, indent=2) + "\n", encoding="utf-8")
                        PY
                    expected_outputs:
                      - name: design_open_findings_path
                        path: ${inputs.state_root}/design_open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: design_open_findings
                        from: design_open_findings_path
                  - name: WriteRevisedRevisionDesignDecision
                    id: write_revised_revision_design_decision
                    set_scalar:
                      artifact: design_loop_decision
                      value: REVISE
              BLOCK:
                id: block_revision_design_path
                outputs:
                  design_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteBlockedRevisionDesignDecision.artifacts.design_loop_decision
                steps:
                  - name: WriteBlockedRevisionDesignDecision
                    id: write_blocked_revision_design_decision
                    set_scalar:
                      artifact: design_loop_decision
                      value: BLOCK
                  - name: FailBlockedRevisionDesign
                    id: fail_blocked_revision_design
                    command:
                      - bash
                      - -lc
                      - |
                        echo "Revision design review blocked planning." >&2
                        exit 1

  - name: DraftRevisionImplementationPlan
    id: draft_revision_implementation_plan
    provider: codex
    asset_file: prompts/revision_study_stack/draft_plan.md
    timeout_sec: 3600
    consumes:
      - artifact: approved_design
        policy: latest_successful
        freshness: any
      - artifact: revision_context
        policy: latest_successful
        freshness: any
    prompt_consumes: ["approved_design", "revision_context"]
    expected_outputs:
      - name: plan_path
        path: ${inputs.state_root}/plan_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
    publishes:
      - artifact: plan
        from: plan_path

  - name: RevisionPlanReviewLoop
    id: revision_plan_review_loop
    repeat_until:
      id: revision_plan_review_iteration
      max_iterations: 12
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE"]
          from:
            ref: self.steps.RouteRevisionPlanDecision.artifacts.plan_loop_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewRevisionImplementationPlan
          id: review_revision_implementation_plan
          provider: codex
          asset_file: prompts/revision_study_stack/review_plan.md
          timeout_sec: 1800
          consumes:
            - artifact: approved_design
              policy: latest_successful
              freshness: any
            - artifact: revision_context
              policy: latest_successful
              freshness: any
            - artifact: plan
              policy: latest_successful
              freshness: any
            - artifact: plan_open_findings
              policy: latest_successful
              freshness: any
          prompt_consumes: ["approved_design", "revision_context", "plan", "plan_open_findings"]
          expected_outputs:
            - name: plan_review_report_path
              path: ${inputs.state_root}/plan_review_report_path.txt
              type: relpath
              under: artifacts/revision_studies
              must_exist_target: true
            - name: plan_review_decision
              path: ${inputs.state_root}/plan_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE"]
            - name: unresolved_high_count
              path: ${inputs.state_root}/plan_unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/plan_unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: plan_review_report
              from: plan_review_report_path
            - artifact: plan_review_decision
              from: plan_review_decision

        - name: RouteRevisionPlanDecision
          id: route_revision_plan_decision
          match:
            ref: self.steps.ReviewRevisionImplementationPlan.artifacts.plan_review_decision
            cases:
              APPROVE:
                id: approve_revision_plan_path
                outputs:
                  plan_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteApprovedRevisionPlanDecision.artifacts.plan_loop_decision
                steps:
                  - name: WriteApprovedRevisionPlanDecision
                    id: write_approved_revision_plan_decision
                    set_scalar:
                      artifact: plan_loop_decision
                      value: APPROVE
              REVISE:
                id: revise_revision_plan_path
                outputs:
                  plan_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteRevisedRevisionPlanDecision.artifacts.plan_loop_decision
                steps:
                  - name: ReviseRevisionImplementationPlan
                    id: revise_revision_implementation_plan
                    provider: codex
                    asset_file: prompts/revision_study_stack/revise_plan.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: approved_design
                        policy: latest_successful
                        freshness: any
                      - artifact: revision_context
                        policy: latest_successful
                        freshness: any
                      - artifact: plan
                        policy: latest_successful
                        freshness: any
                      - artifact: plan_review_report
                        policy: latest_successful
                        freshness: since_last_consume
                    prompt_consumes: ["approved_design", "revision_context", "plan", "plan_review_report"]
                    expected_outputs:
                      - name: plan_path
                        path: ${inputs.state_root}/plan_path.txt
                        type: relpath
                        under: artifacts/revision_studies
                        must_exist_target: true
                    publishes:
                      - artifact: plan
                        from: plan_path
                  - name: ExtractOpenRevisionPlanFindings
                    id: extract_open_revision_plan_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/plan_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))
                        carried = [
                            finding
                            for finding in report.get("findings", [])
                            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}
                        ]
                        open_findings_pointer = Path("${inputs.state_root}/plan_open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(json.dumps({"findings": carried}, indent=2) + "\n", encoding="utf-8")
                        PY
                    expected_outputs:
                      - name: plan_open_findings_path
                        path: ${inputs.state_root}/plan_open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: plan_open_findings
                        from: plan_open_findings_path
                  - name: WriteRevisedRevisionPlanDecision
                    id: write_revised_revision_plan_decision
                    set_scalar:
                      artifact: plan_loop_decision
                      value: REVISE

  - name: ExecuteRevisionStudyPlan
    id: execute_revision_study_plan
    provider: codex
    asset_file: prompts/revision_study_stack/implement_plan.md
    timeout_sec: 43200
    consumes:
      - artifact: approved_design
        policy: latest_successful
        freshness: any
      - artifact: revision_context
        policy: latest_successful
        freshness: any
      - artifact: plan
        policy: latest_successful
        freshness: any
    prompt_consumes: ["approved_design", "revision_context", "plan"]
    expected_outputs:
      - name: execution_report_path
        path: ${inputs.state_root}/execution_report_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
    publishes:
      - artifact: execution_report
        from: execution_report_path

  - name: RevisionImplementationReviewLoop
    id: revision_implementation_review_loop
    repeat_until:
      id: revision_implementation_review_iteration
      max_iterations: 24
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE"]
          from:
            ref: self.steps.RouteRevisionImplementationDecision.artifacts.implementation_loop_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewRevisionImplementation
          id: review_revision_implementation
          provider: codex
          asset_file: prompts/revision_study_stack/review_implementation.md
          timeout_sec: 1800
          consumes:
            - artifact: approved_design
              policy: latest_successful
              freshness: any
            - artifact: revision_context
              policy: latest_successful
              freshness: any
            - artifact: plan
              policy: latest_successful
              freshness: any
            - artifact: execution_report
              policy: latest_successful
              freshness: any
            - artifact: implementation_open_findings
              policy: latest_successful
              freshness: any
          prompt_consumes: ["approved_design", "revision_context", "plan", "execution_report", "implementation_open_findings"]
          expected_outputs:
            - name: implementation_review_report_path
              path: ${inputs.state_root}/implementation_review_report_path.txt
              type: relpath
              under: artifacts/revision_studies
              must_exist_target: true
            - name: implementation_review_decision
              path: ${inputs.state_root}/implementation_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE"]
            - name: implementation_review_findings_path
              path: ${inputs.state_root}/implementation_review_findings_path.txt
              type: relpath
              under: state
              must_exist_target: true
            - name: unresolved_high_count
              path: ${inputs.state_root}/implementation_unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/implementation_unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: implementation_review_report
              from: implementation_review_report_path
            - artifact: implementation_review_decision
              from: implementation_review_decision

        - name: ExtractOpenRevisionImplementationFindings
          id: extract_open_revision_implementation_findings
          command:
            - bash
            - -lc
            - |
              python - <<'PY'
              import json
              from pathlib import Path

              review_pointer = Path("${inputs.state_root}/implementation_review_findings_path.txt")
              review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
              report = json.loads(review_path.read_text(encoding="utf-8"))
              carried = [
                  finding
                  for finding in report.get("findings", [])
                  if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}
              ]
              open_findings_pointer = Path("${inputs.state_root}/implementation_open_findings_path.txt")
              open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
              open_findings_path.parent.mkdir(parents=True, exist_ok=True)
              open_findings_path.write_text(json.dumps({"findings": carried}, indent=2) + "\n", encoding="utf-8")
              PY
          expected_outputs:
            - name: implementation_open_findings_path
              path: ${inputs.state_root}/implementation_open_findings_path.txt
              type: relpath
              under: state
              must_exist_target: true
          publishes:
            - artifact: implementation_open_findings
              from: implementation_open_findings_path

        - name: RouteRevisionImplementationDecision
          id: route_revision_implementation_decision
          match:
            ref: self.steps.ReviewRevisionImplementation.artifacts.implementation_review_decision
            cases:
              APPROVE:
                id: approve_revision_implementation_path
                outputs:
                  implementation_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteApprovedRevisionImplementationDecision.artifacts.implementation_loop_decision
                steps:
                  - name: WriteApprovedRevisionImplementationDecision
                    id: write_approved_revision_implementation_decision
                    set_scalar:
                      artifact: implementation_loop_decision
                      value: APPROVE
              REVISE:
                id: revise_revision_implementation_path
                outputs:
                  implementation_loop_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE"]
                    from:
                      ref: self.steps.WriteRevisedRevisionImplementationDecision.artifacts.implementation_loop_decision
                steps:
                  - name: FixRevisionImplementation
                    id: fix_revision_implementation
                    provider: codex
                    asset_file: prompts/revision_study_stack/fix_implementation.md
                    timeout_sec: 43200
                    consumes:
                      - artifact: approved_design
                        policy: latest_successful
                        freshness: any
                      - artifact: revision_context
                        policy: latest_successful
                        freshness: any
                      - artifact: plan
                        policy: latest_successful
                        freshness: any
                      - artifact: execution_report
                        policy: latest_successful
                        freshness: any
                      - artifact: implementation_review_report
                        policy: latest_successful
                        freshness: since_last_consume
                    prompt_consumes: ["approved_design", "revision_context", "plan", "execution_report", "implementation_review_report"]
                    expected_outputs:
                      - name: execution_report_path
                        path: ${inputs.state_root}/execution_report_path.txt
                        type: relpath
                        under: artifacts/revision_studies
                        must_exist_target: true
                    publishes:
                      - artifact: execution_report
                        from: execution_report_path
                  - name: WriteRevisedRevisionImplementationDecision
                    id: write_revised_revision_implementation_decision
                    set_scalar:
                      artifact: implementation_loop_decision
                      value: REVISE

  - name: FinalizeRevisionStudyOutputs
    id: finalize_revision_study_outputs
    command:
      - bash
      - -lc
      - |
        cat "${inputs.state_root}/approved_design_path.txt" > "${inputs.state_root}/final_approved_design_path.txt"
        cat "${inputs.state_root}/revision_context_path.txt" > "${inputs.state_root}/final_revision_context_path.txt"
        cat "${inputs.state_root}/design_review_report_path.txt" > "${inputs.state_root}/final_design_review_report_path.txt"
        cat "${inputs.state_root}/design_review_decision.txt" > "${inputs.state_root}/final_design_review_decision.txt"
        cat "${inputs.state_root}/plan_path.txt" > "${inputs.state_root}/final_plan_path.txt"
        cat "${inputs.state_root}/plan_review_report_path.txt" > "${inputs.state_root}/final_plan_review_report_path.txt"
        cat "${inputs.state_root}/plan_review_decision.txt" > "${inputs.state_root}/final_plan_review_decision.txt"
        cat "${inputs.state_root}/execution_report_path.txt" > "${inputs.state_root}/final_execution_report_path.txt"
        cat "${inputs.state_root}/implementation_review_report_path.txt" > "${inputs.state_root}/final_implementation_review_report_path.txt"
        cat "${inputs.state_root}/implementation_review_decision.txt" > "${inputs.state_root}/final_implementation_review_decision.txt"
    expected_outputs:
      - name: approved_design_path
        path: ${inputs.state_root}/final_approved_design_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: revision_context_path
        path: ${inputs.state_root}/final_revision_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: design_review_report_path
        path: ${inputs.state_root}/final_design_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: design_review_decision
        path: ${inputs.state_root}/final_design_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE", "BLOCK"]
      - name: plan_path
        path: ${inputs.state_root}/final_plan_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: plan_review_report_path
        path: ${inputs.state_root}/final_plan_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: plan_review_decision
        path: ${inputs.state_root}/final_plan_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE"]
      - name: execution_report_path
        path: ${inputs.state_root}/final_execution_report_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: implementation_review_report_path
        path: ${inputs.state_root}/final_implementation_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: implementation_review_decision
        path: ${inputs.state_root}/final_implementation_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE"]
