version: "2.7"
name: "revision-study-design-phase"

context:
  workflow_model: "gpt-5.4"
  workflow_effort: "high"

inputs:
  state_root:
    type: relpath
    under: state
  revision_design_path:
    type: relpath
    must_exist_target: true
  revision_context_path:
    type: relpath
  approved_design_target_path:
    type: relpath
    under: artifacts/revision_studies
  design_review_report_target_path:
    type: relpath
    under: artifacts/revision_studies

outputs:
  approved_design_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionDesignPhaseOutputs.artifacts.approved_design_path
  revision_context_path:
    type: relpath
    under: state
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionDesignPhaseOutputs.artifacts.revision_context_path
  design_review_report_path:
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
    from:
      ref: root.steps.FinalizeRevisionDesignPhaseOutputs.artifacts.design_review_report_path
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
    from:
      ref: root.steps.FinalizeRevisionDesignPhaseOutputs.artifacts.design_review_decision

providers:
  codex:
    command: ["codex", "exec", "--dangerously-bypass-approvals-and-sandbox", "--skip-git-repo-check", "--model", "${model}", "--config", "reasoning_effort=${effort}"]
    input_mode: "stdin"
    defaults:
      model: "${context.workflow_model}"
      effort: "${context.workflow_effort}"

artifacts:
  revision_design_seed:
    pointer: ${inputs.state_root}/revision_design_seed_path.txt
    type: relpath
    must_exist_target: true
  revision_context:
    pointer: ${inputs.state_root}/revision_context_path.txt
    type: relpath
    under: state
    must_exist_target: true
  approved_design:
    pointer: ${inputs.state_root}/approved_design_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  design_review_report:
    pointer: ${inputs.state_root}/design_review_report_path.txt
    type: relpath
    under: artifacts/revision_studies
    must_exist_target: true
  design_review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]
  open_findings:
    pointer: ${inputs.state_root}/open_findings_path.txt
    type: relpath
    under: state
    must_exist_target: true
  review_decision:
    kind: scalar
    type: enum
    allowed: ["APPROVE", "REVISE", "BLOCK"]

steps:
  - name: InitializeRevisionDesignPhasePaths
    id: initialize_revision_design_phase_paths
    command:
      - bash
      - -lc
      - |
        mkdir -p "${inputs.state_root}"
        mkdir -p "$(dirname "${inputs.approved_design_target_path}")"
        mkdir -p "$(dirname "${inputs.design_review_report_target_path}")"
        printf '%s\n' "${inputs.approved_design_target_path}" > "${inputs.state_root}/approved_design_path.txt"
        printf '%s\n' "${inputs.design_review_report_target_path}" > "${inputs.state_root}/design_review_report_path.txt"
        printf '%s\n' "${inputs.state_root}/open_findings.json" > "${inputs.state_root}/open_findings_path.txt"
        cat > "${inputs.state_root}/open_findings.json" <<'JSON'
        {
          "findings": []
        }
        JSON
    expected_outputs:
      - name: approved_design_path
        path: ${inputs.state_root}/approved_design_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: design_review_report_path
        path: ${inputs.state_root}/design_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
      - name: open_findings_path
        path: ${inputs.state_root}/open_findings_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: open_findings
        from: open_findings_path

  - name: PublishRevisionDesignInputs
    id: publish_revision_design_inputs
    command:
      - bash
      - -lc
      - |
        if [ ! -f "${inputs.revision_design_path}" ]; then
          echo "Missing revision design seed: ${inputs.revision_design_path}" >&2
          exit 1
        fi
        printf '%s\n' "${inputs.revision_design_path}" > "${inputs.state_root}/revision_design_seed_path.txt"

        context_target="${inputs.state_root}/revision_context.md"
        if [ -f "${inputs.revision_context_path}" ]; then
          cp "${inputs.revision_context_path}" "$context_target"
        else
          cat > "$context_target" <<'EOF'
        # Revision Context

        No separate revision context file was found. Use the consumed revision design seed as the primary source of study scope and reviewer-response requirements.
        EOF
        fi
        printf '%s\n' "$context_target" > "${inputs.state_root}/revision_context_path.txt"
    expected_outputs:
      - name: revision_design_seed_path
        path: ${inputs.state_root}/revision_design_seed_path.txt
        type: relpath
        must_exist_target: true
      - name: revision_context_path
        path: ${inputs.state_root}/revision_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
    publishes:
      - artifact: revision_design_seed
        from: revision_design_seed_path
      - artifact: revision_context
        from: revision_context_path

  - name: DraftApprovedRevisionDesign
    id: draft_approved_revision_design
    provider: codex
    asset_file: prompts/revision_study_stack/draft_approved_design.md
    timeout_sec: 3600
    consumes:
      - artifact: revision_design_seed
        policy: latest_successful
        freshness: any
      - artifact: revision_context
        policy: latest_successful
        freshness: any
    prompt_consumes: ["revision_design_seed", "revision_context"]
    expected_outputs:
      - name: approved_design_path
        path: ${inputs.state_root}/approved_design_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
    publishes:
      - artifact: approved_design
        from: approved_design_path

  - name: RevisionDesignReviewLoop
    id: revision_design_review_loop
    repeat_until:
      id: revision_design_review_iteration
      max_iterations: 12
      outputs:
        review_decision:
          kind: scalar
          type: enum
          allowed: ["APPROVE", "REVISE", "BLOCK"]
          from:
            ref: self.steps.RouteRevisionDesignDecision.artifacts.review_decision
      condition:
        compare:
          left:
            ref: self.outputs.review_decision
          op: eq
          right: APPROVE
      steps:
        - name: ReviewApprovedRevisionDesign
          id: review_approved_revision_design
          provider: codex
          asset_file: prompts/revision_study_stack/review_design.md
          timeout_sec: 1800
          depends_on:
            optional:
              - docs/index.md
              - docs/findings.md
              - docs/DEVELOPER_GUIDE.md
              - docs/architecture.md
              - specs/data_contracts.md
            inject:
              mode: list
              position: prepend
              instruction: "Repository documentation candidate files resolved from depends_on.optional:"
          consumes:
            - artifact: revision_design_seed
              policy: latest_successful
              freshness: any
            - artifact: revision_context
              policy: latest_successful
              freshness: any
            - artifact: approved_design
              policy: latest_successful
              freshness: any
            - artifact: open_findings
              policy: latest_successful
              freshness: any
          prompt_consumes: ["revision_design_seed", "revision_context", "approved_design", "open_findings"]
          expected_outputs:
            - name: design_review_report_path
              path: ${inputs.state_root}/design_review_report_path.txt
              type: relpath
              under: artifacts/revision_studies
              must_exist_target: true
            - name: design_review_decision
              path: ${inputs.state_root}/design_review_decision.txt
              type: enum
              allowed: ["APPROVE", "REVISE", "BLOCK"]
            - name: unresolved_high_count
              path: ${inputs.state_root}/unresolved_high_count.txt
              type: integer
            - name: unresolved_medium_count
              path: ${inputs.state_root}/unresolved_medium_count.txt
              type: integer
          publishes:
            - artifact: design_review_report
              from: design_review_report_path
            - artifact: design_review_decision
              from: design_review_decision

        - name: RouteRevisionDesignDecision
          id: route_revision_design_decision
          match:
            ref: self.steps.ReviewApprovedRevisionDesign.artifacts.design_review_decision
            cases:
              APPROVE:
                id: approve_revision_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteApprovedRevisionDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteApprovedRevisionDesignDecision
                    id: write_approved_revision_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: APPROVE
              REVISE:
                id: revise_revision_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteRevisedRevisionDesignDecision.artifacts.review_decision
                steps:
                  - name: ReviseApprovedRevisionDesign
                    id: revise_approved_revision_design
                    provider: codex
                    asset_file: prompts/revision_study_stack/revise_design.md
                    timeout_sec: 3600
                    consumes:
                      - artifact: revision_design_seed
                        policy: latest_successful
                        freshness: any
                      - artifact: revision_context
                        policy: latest_successful
                        freshness: any
                      - artifact: approved_design
                        policy: latest_successful
                        freshness: any
                      - artifact: design_review_report
                        policy: latest_successful
                        freshness: since_last_consume
                    prompt_consumes: ["revision_design_seed", "revision_context", "approved_design", "design_review_report"]
                    expected_outputs:
                      - name: approved_design_path
                        path: ${inputs.state_root}/approved_design_path.txt
                        type: relpath
                        under: artifacts/revision_studies
                        must_exist_target: true
                    publishes:
                      - artifact: approved_design
                        from: approved_design_path
                  - name: ExtractOpenRevisionDesignFindings
                    id: extract_open_revision_design_findings
                    command:
                      - bash
                      - -lc
                      - |
                        python - <<'PY'
                        import json
                        from pathlib import Path

                        review_pointer = Path("${inputs.state_root}/design_review_report_path.txt")
                        review_path = Path(review_pointer.read_text(encoding="utf-8").strip())
                        report = json.loads(review_path.read_text(encoding="utf-8"))

                        carried = []
                        for finding in report.get("findings", []):
                            if finding.get("status") in {"STILL_OPEN", "NEW", "SPLIT"}:
                                carried.append(finding)

                        open_findings_pointer = Path("${inputs.state_root}/open_findings_path.txt")
                        open_findings_path = Path(open_findings_pointer.read_text(encoding="utf-8").strip())
                        open_findings_path.parent.mkdir(parents=True, exist_ok=True)
                        open_findings_path.write_text(
                            json.dumps({"findings": carried}, indent=2) + "\n",
                            encoding="utf-8",
                        )
                        PY
                    expected_outputs:
                      - name: open_findings_path
                        path: ${inputs.state_root}/open_findings_path.txt
                        type: relpath
                        under: state
                        must_exist_target: true
                    publishes:
                      - artifact: open_findings
                        from: open_findings_path
                  - name: WriteRevisedRevisionDesignDecision
                    id: write_revised_revision_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: REVISE
              BLOCK:
                id: block_revision_design_path
                outputs:
                  review_decision:
                    kind: scalar
                    type: enum
                    allowed: ["APPROVE", "REVISE", "BLOCK"]
                    from:
                      ref: self.steps.WriteBlockedRevisionDesignDecision.artifacts.review_decision
                steps:
                  - name: WriteBlockedRevisionDesignDecision
                    id: write_blocked_revision_design_decision
                    set_scalar:
                      artifact: review_decision
                      value: BLOCK
                  - name: FailBlockedRevisionDesign
                    id: fail_blocked_revision_design
                    command:
                      - bash
                      - -lc
                      - |
                        echo "Revision design review blocked planning." >&2
                        exit 1

  - name: FinalizeRevisionDesignPhaseOutputs
    id: finalize_revision_design_phase_outputs
    command:
      - bash
      - -lc
      - |
        cat "${inputs.state_root}/approved_design_path.txt" > "${inputs.state_root}/final_approved_design_path.txt"
        cat "${inputs.state_root}/revision_context_path.txt" > "${inputs.state_root}/final_revision_context_path.txt"
        cat "${inputs.state_root}/design_review_report_path.txt" > "${inputs.state_root}/final_design_review_report_path.txt"
        cat "${inputs.state_root}/design_review_decision.txt" > "${inputs.state_root}/final_design_review_decision.txt"
    expected_outputs:
      - name: approved_design_path
        path: ${inputs.state_root}/final_approved_design_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: revision_context_path
        path: ${inputs.state_root}/final_revision_context_path.txt
        type: relpath
        under: state
        must_exist_target: true
      - name: design_review_report_path
        path: ${inputs.state_root}/final_design_review_report_path.txt
        type: relpath
        under: artifacts/revision_studies
        must_exist_target: true
      - name: design_review_decision
        path: ${inputs.state_root}/final_design_review_decision.txt
        type: enum
        allowed: ["APPROVE", "REVISE", "BLOCK"]
